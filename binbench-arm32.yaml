# Lima configuration for BinBench dedicated ARM32 (armhf) environment
# This VM runs a native 32-bit ARM kernel via QEMU system emulation.
# Use this to solve Frida compatibility issues on M4 (AArch64).

# VM Type must be qemu for non-native architecture
vmType: "qemu"

# Architecture: armv7l (32-bit ARM)
arch: "armv7l"

images:
  # Ubuntu 18.04 LTS (Bionic Beaver) - armhf (32-bit hard float)
  # armhf is the standard for 32-bit ARM linux (Raspberry Pi etc.)
  - location: "https://cloud-images.ubuntu.com/releases/bionic/release/ubuntu-18.04-server-cloudimg-armhf.img"
    arch: "armv7l"

# CPUs and Memory
# Emulation is slow, so don't over-allocate cpus, but memory is cheap.
cpus: 4
memory: "2GiB"

# QEMU Firmware
# armv7l usually boots via direct kernel loading or u-boot, but cloud images
# typically work with standard Lima/QEMU boot flows.
# We don't need legacyBIOS for ARM.

# Mounts
mounts:
  - location: "/Users/eren/Desktop/Antigravity/bindebench"
    writable: true

# SSH
ssh:
  localPort: 0
  loadDotSSHPubKeys: true
  forwardAgent: true
